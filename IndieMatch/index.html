<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>IndieMatch Demo</title>
</head>

<body>
    <!-- Dev Panel for debugging -->
    <div id="dev-panel">
        <div id="dev-info">Init...</div>
        <div id="dev-log">Waiting...</div>
    </div>

    <div id="desktop-wrapper">
        <div id="phone-frame">
            <div id="app">

                <!-- Feed Container -->
                <div id="feed-container">
                    <!-- Playables will be injected here -->
                </div>

                <!-- Interaction Layers -->
                <div id="edge-zone-left" class="edge-zone"></div>
                <div id="edge-zone-right" class="edge-zone"></div>

                <!-- UI Overlay (Static for now, could be dynamic per item if needed) -->
                <!-- Profile View (Initially Hidden) -->
                <div id="profile-view" class="hidden-right">
                    <div class="profile-header">
                        <div class="nav-bar">
                            <span class="back-btn" id="profile-back">‹</span>
                            <span class="title">Profile</span>
                            <span class="settings-icon">≡</span>
                        </div>
                        <div class="profile-info">
                            <div class="profile-avatar">
                                <img src="https://ui-avatars.com/api/?name=Indie+Match&background=fe2c55&color=fff"
                                    alt="Avatar">
                            </div>
                            <div class="profile-names">
                                <h2 class="display-name">Developer</h2>
                                <p class="username-tag">@developer</p>
                            </div>
                            <div class="profile-stats">
                                <div class="stat-box">
                                    <span class="num">142</span>
                                    <span class="label">Following</span>
                                </div>
                                <div class="stat-box">
                                    <span class="num">8.2M</span>
                                    <span class="label">Followers</span>
                                </div>
                                <div class="stat-box">
                                    <span class="num">1.4B</span>
                                    <span class="label">Likes</span>
                                </div>
                            </div>
                            <div class="profile-bio">
                                Building the future of indie games! 🛠️ <br>
                                Play nicely.
                            </div>
                            <div class="profile-actions">
                                <button class="btn-primary">Follow</button>
                                <button class="btn-secondary">Message</button>
                            </div>
                        </div>
                    </div>

                    <div class="profile-tabs">
                        <div class="tab active" data-tab="likes">Likes</div>
                        <div class="tab" data-tab="reposts">Reposts</div>
                    </div>

                    <div class="video-grid">
                        <!-- Grid items will be dynamically populated by JavaScript -->
                    </div>
                </div>

                <div id="ui-overlay">
                    <!-- Audio Toggle -->
                    <div id="sound-control" class="sound-control">
                        <span class="sound-icon">🔇</span>
                    </div>

                    <!-- Top Header -->
                    <div class="top-header">
                        <span class="tab inactive" id="tab-following">Following</span>
                        <span class="separator">|</span>
                        <span class="tab active" id="tab-foryou">For You</span>
                    </div>

                    <!-- Right Action Bar -->
                    <div class="right-actions">
                        <div class="action-item">
                            <div class="icon-circle profile-pic"></div>
                        </div>
                        <div class="action-item" id="like-btn">
                            <span class="icon heart-icon">♥</span>
                            <span class="count">8.2M</span>
                        </div>
                        <div class="action-item">
                            <span class="icon">💬</span>
                            <span class="count">54K</span>
                        </div>
                        <div class="action-item" id="repost-btn">
                            <span class="icon repost-icon">↻</span>
                            <span class="count">21K</span>
                        </div>
                        <div class="action-item">
                            <span class="icon">↗</span>
                            <span class="count">Share</span>
                        </div>
                    </div>

                    <!-- Bottom Info -->
                    <div class="bottom-info">
                        <div class="username">@IndieMatch</div>
                        <div class="description">Swipe right to play nicely! <span class="tag">#demo</span> <span
                                class="tag">#gaming</span></div>
                        <div class="music-note">♫ Original Sound - IndieMatch Demo</div>
                    </div>
                </div>



                <!-- Global Toast -->
                <div id="toast" class="hidden"></div>

                <!-- Loading Overlay -->
                <div id="loading-overlay" class="hidden">
                    <div class="spinner"></div>
                </div>

            </div>
        </div>
    </div>
    <script type="module" src="/src/main.js"></script>
</body>

</html>
