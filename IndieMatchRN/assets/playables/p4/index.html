<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Neon Dodger</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: #111;
            touch-action: none;
            font-family: 'Courier New', Courier, monospace;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        #ui {
            position: absolute;
            top: 20px;
            left: 0;
            width: 100%;
            text-align: center;
            pointer-events: none;
            color: #0ff;
            text-shadow: 0 0 10px #0ff;
        }

        #score {
            font-size: 40px;
            font-weight: bold;
        }

        #game-over {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #f0f;
            font-size: 30px;
            display: none;
            text-align: center;
            text-shadow: 0 0 20px #f0f;
            pointer-events: auto;
            cursor: pointer;
            background: rgba(0, 0, 0, 0.8);
            padding: 20px;
            border: 2px solid #f0f;
            border-radius: 10px;
        }

        #start-msg {
            position: absolute;
            top: 60%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #fff;
            font-size: 18px;
            animation: pulse 1s infinite;
            text-align: center;
        }

        @keyframes pulse {
            0% {
                opacity: 0.5;
            }

            50% {
                opacity: 1;
            }

            100% {
                opacity: 0.5;
            }
        }
    </style>
</head>

<body>
    <div id="ui">
        <div id="score">0</div>
    </div>
    <div id="start-msg">Tap to Start<br><small>Drag to Move</small></div>
    <div id="game-over">GAME OVER<br><span style="font-size:16px; color:white">Tap to Restart</span></div>
    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');
        const gameOverEl = document.getElementById('game-over');
        const startMsg = document.getElementById('start-msg');

        let width, height;
        let player = { x: 0, y: 0, size: 20, color: '#0ff' };
        let obstacles = [];
        let particles = [];
        let score = 0;
        let gameActive = false;
        let speed = 5;
        let frameId;

        // Audio Context (Simple Synth)
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        let actx = new AudioContext();
        let isMuted = false;

        function resize() {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;
            player.y = height - 100;
            player.x = width / 2;
        }
        window.addEventListener('resize', resize);
        resize();

        function playSound(type) {
            if (isMuted || !actx) return;
            if (actx.state === 'suspended') actx.resume();

            const osc = actx.createOscillator();
            const gain = actx.createGain();
            osc.connect(gain);
            gain.connect(actx.destination);

            if (type === 'score') {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(440, actx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(880, actx.currentTime + 0.1);
                gain.gain.setValueAtTime(0.1, actx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, actx.currentTime + 0.1);
                osc.start();
                osc.stop(actx.currentTime + 0.1);
            } else if (type === 'crash') {
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(100, actx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(20, actx.currentTime + 0.3);
                gain.gain.setValueAtTime(0.3, actx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, actx.currentTime + 0.3);
                osc.start();
                osc.stop(actx.currentTime + 0.3);
            }
        }

        // Bridge Listener
        window.addEventListener('message', (e) => {
            if (e.data && e.data.type === 'mute') {
                isMuted = e.data.value;
                if (isMuted && actx) actx.suspend();
                else if (!isMuted && actx) actx.resume();
            }
        });

        function spawnObstacle() {
            const size = 30 + Math.random() * 40;
            obstacles.push({
                x: Math.random() * (width - size),
                y: -100,
                w: size,
                h: size,
                color: `hsl(${Math.random() * 360}, 100%, 50%)`,
                speed: speed + Math.random() * 2
            });
        }

        function createParticles(x, y, color) {
            for (let i = 0; i < 10; i++) {
                particles.push({
                    x: x, y: y,
                    vx: (Math.random() - 0.5) * 10,
                    vy: (Math.random() - 0.5) * 10,
                    life: 1.0,
                    color: color
                });
            }
        }

        function update() {
            if (!gameActive) return;

            ctx.fillStyle = 'rgba(17, 17, 17, 0.3)';
            ctx.fillRect(0, 0, width, height);

            // Player
            ctx.shadowBlur = 20;
            ctx.shadowColor = player.color;
            ctx.fillStyle = player.color;
            ctx.beginPath();
            ctx.arc(player.x, player.y, player.size, 0, Math.PI * 2);
            ctx.fill();
            ctx.shadowBlur = 0;

            // Obstacles
            if (Math.random() < 0.05) spawnObstacle();

            for (let i = obstacles.length - 1; i >= 0; i--) {
                let o = obstacles[i];
                o.y += o.speed;

                ctx.shadowBlur = 10;
                ctx.shadowColor = o.color;
                ctx.fillStyle = o.color;
                ctx.fillRect(o.x, o.y, o.w, o.h);
                ctx.shadowBlur = 0;

                // Collision
                const dx = player.x - (o.x + o.w / 2);
                const dy = player.y - (o.y + o.h / 2);
                const dist = Math.sqrt(dx * dx + dy * dy);

                if (dist < player.size + o.w / 2) {
                    gameOver();
                }

                if (o.y > height) {
                    obstacles.splice(i, 1);
                    score++;
                    scoreEl.innerText = score;
                    if (score % 10 === 0) speed += 0.5;
                    playSound('score');
                }
            }

            // Particles
            for (let i = particles.length - 1; i >= 0; i--) {
                let p = particles[i];
                p.x += p.vx;
                p.y += p.vy;
                p.life -= 0.05;
                ctx.fillStyle = p.color;
                ctx.globalAlpha = p.life;
                ctx.fillRect(p.x, p.y, 4, 4);
                ctx.globalAlpha = 1;
                if (p.life <= 0) particles.splice(i, 1);
            }

            frameId = requestAnimationFrame(update);
        }

        function startGame() {
            gameActive = true;
            score = 0;
            speed = 5;
            obstacles = [];
            scoreEl.innerText = '0';
            gameOverEl.style.display = 'none';
            startMsg.style.display = 'none';
            if (actx && actx.state === 'suspended' && !isMuted) actx.resume();
            update();
        }

        function gameOver() {
            gameActive = false;
            cancelAnimationFrame(frameId);
            gameOverEl.style.display = 'block';
            playSound('crash');
            createParticles(player.x, player.y, '#fff');
        }

        // Controls
        document.addEventListener('touchstart', (e) => {
            if (!gameActive) startGame();
            player.x = e.touches[0].clientX;
        });
        document.addEventListener('touchmove', (e) => {
            if (gameActive) player.x = e.touches[0].clientX;
            e.preventDefault(); // Prevent scrolling
        }, { passive: false });

        document.addEventListener('mousemove', (e) => {
            if (gameActive) player.x = e.clientX;
        });
        document.addEventListener('mousedown', () => {
            if (!gameActive) startGame();
            else if (gameOverEl.style.display === 'block') startGame();
        });

    </script>
</body>

</html>
